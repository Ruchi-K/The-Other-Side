<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>The Other Side</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  width: 380px; min-height: 460px; max-height: 580px;
  background: #07070e; color: #eeeaf8;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 13px;
}
.hdr {
  padding: 13px 16px 11px;
  border-bottom: 1px solid #1e1e32;
  display: flex; align-items: center; justify-content: space-between;
}
.logo {
  font-size: 15px; font-weight: 800;
  background: linear-gradient(120deg,#eeeaf8,#a78bfa);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.section { padding: 11px 16px; border-bottom: 1px solid #1e1e32; }
.label { font-size: 9px; font-weight: 600; letter-spacing: .18em; text-transform: uppercase; color: #52506a; margin-bottom: 8px; }

.lenses { display: flex; gap: 6px; flex-wrap: wrap; }
.lens { padding: 5px 10px; border-radius: 8px; border: 1px solid #2a2840; background: #111120; color: #7a7894; font-size: 11px; cursor: pointer; transition: all .15s; }
.lens:hover { border-color: #a78bfa44; color: #c4b5fd; }
.lens.on { background: #a78bfa18; border-color: #a78bfa; color: #a78bfa; font-weight: 700; }

textarea {
  width: 100%; height: 80px; background: #111120;
  border: 1px solid #2a2840; border-radius: 10px;
  color: #eeeaf8; font-size: 12px; padding: 10px 12px;
  resize: none; outline: none; font-family: inherit; line-height: 1.5; transition: border-color .15s;
}
textarea:focus { border-color: #a78bfa44; }
textarea::placeholder { color: #3a3860; }

.flip-btn {
  width: 100%; padding: 11px; background: #a78bfa; border: none;
  border-radius: 10px; color: #07070e; font-size: 13px; font-weight: 700;
  cursor: pointer; transition: all .15s; margin-top: 10px;
}
.flip-btn:hover { background: #c4b5fd; }
.flip-btn:disabled { background: #2a2840; color: #52506a; cursor: not-allowed; }

.loader { padding: 32px 16px; text-align: center; display: none; }
.spin {
  display: inline-block; width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid #1e1e32; border-top-color: #a78bfa;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loader-txt { font-size: 12px; color: #52506a; margin-top: 10px; }

.result { display: none; flex-direction: column; overflow-y: auto; max-height: 520px; }

.bridge-card { padding: 13px 16px; border-bottom: 1px solid #1e1e32; background: #0f0e06; }
.bridge-hl { font-size: 13px; font-weight: 800; color: #f0c96a; margin-bottom: 8px; line-height: 1.4; }
.bridge-body { font-size: 12px; color: #9a8850; line-height: 1.65; }

.facts-card { padding: 10px 16px; border-bottom: 1px solid #1e1e32; }
.fact-item { background: #111120; border-radius: 8px; padding: 8px 10px; margin-bottom: 6px; font-size: 11px; color: #c4c0d8; line-height: 1.5; }
.fact-src { font-size: 9px; color: #52506a; margin-top: 3px; }
.badge { display: inline-block; font-size: 9px; padding: 1px 5px; border-radius: 4px; margin-left: 5px; vertical-align: middle; }
.high     { background: #4ade8018; color: #4ade80; }
.moderate { background: #f0c96a18; color: #f0c96a; }
.uncertain{ background: #f8717118; color: #f87171; }

.closing-card { padding: 12px 16px; border-bottom: 1px solid #1e1e32; background: #0d060f; }
.closing-txt { font-size: 12px; color: #e879f9; font-style: italic; line-height: 1.6; }

.fb-card { padding: 12px 16px; }
.fb-row { display: flex; gap: 6px; margin-bottom: 8px; }
.fb-btn {
  flex: 1; padding: 7px 6px; border-radius: 8px; border: 1px solid #2a2840;
  background: #111120; color: #7a7894; font-size: 10px; cursor: pointer; text-align: center; transition: all .15s;
}
.fb-btn:hover { border-color: #a78bfa44; color: #a78bfa; }
.fb-btn.on { background: #a78bfa18; border-color: #a78bfa; color: #a78bfa; font-weight: 700; }
.stars { display: flex; gap: 4px; }
.star {
  width: 28px; height: 28px; border-radius: 6px; border: 1px solid #2a2840;
  background: #111120; color: #52506a; font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all .1s;
}
.star.on { background: #f0c96a18; border-color: #f0c96a; color: #f0c96a; }
.submit-fb {
  width: 100%; padding: 9px; border: 1px solid #2a2840; border-radius: 8px;
  background: #111120; color: #7a7894; font-size: 11px; cursor: pointer;
  margin-top: 8px; transition: all .15s;
}
.submit-fb:hover { border-color: #a78bfa44; color: #a78bfa; }

.declined { display: none; flex-direction: column; align-items: center; padding: 24px 16px; text-align: center; gap: 10px; }
.declined-ttl { font-size: 13px; font-weight: 700; color: #f87171; }
.declined-msg { font-size: 12px; color: #8a5050; line-height: 1.6; }

.back {
  margin: 10px 16px 0; padding: 8px; background: none; border: 1px solid #2a2840;
  border-radius: 8px; color: #52506a; font-size: 11px; cursor: pointer;
  width: calc(100% - 32px); transition: all .15s;
}
.back:hover { border-color: #a78bfa33; color: #a78bfa; }
.err { margin: 0 16px 10px; padding: 9px 12px; background: #120808; border: 1px solid #f8717133; border-radius: 8px; color: #f87171; font-size: 11px; display: none; }
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">◐ The Other Side</div>
  <div style="font-size:10px;color:#52506a">v1.0</div>
</div>

<!-- INPUT -->
<div id="v-input">
  <div class="section">
    <div class="label">Lens</div>
    <div class="lenses" id="lenses"></div>
  </div>
  <div class="section">
    <textarea id="txt" placeholder="Describe the situation, paste a URL, or right-click an image/video on any page…"></textarea>
    <button class="flip-btn" id="flip-btn">◐ Show me the other side</button>
  </div>
  <div class="err" id="err"></div>
</div>

<!-- LOADING -->
<div class="loader" id="v-load">
  <div class="spin"></div>
  <div class="loader-txt">Looking at the other side…</div>
</div>

<!-- RESULT -->
<div class="result" id="v-result">
  <div class="bridge-card" id="bridge-card" style="display:none">
    <div class="bridge-hl" id="bridge-hl"></div>
    <div class="bridge-body" id="bridge-body"></div>
  </div>
  <div class="facts-card" id="facts-card" style="display:none">
    <div class="label" style="margin-bottom:8px">Grounding facts</div>
    <div id="facts-list"></div>
  </div>
  <div class="closing-card" id="closing-card" style="display:none">
    <div class="closing-txt" id="closing-txt"></div>
  </div>
  <div class="fb-card" id="fb-card" style="display:none">
    <div class="label" style="margin-bottom:8px">Was this a new perspective?</div>
    <div class="fb-row">
      <button class="fb-btn" id="fb-yes" data-v="true">Yes, new to me</button>
      <button class="fb-btn" id="fb-no"  data-v="false">Already knew this</button>
    </div>
    <div class="label" style="margin-bottom:6px;margin-top:4px">Fairness</div>
    <div class="stars" id="stars-f"></div>
    <div class="label" style="margin-bottom:6px;margin-top:8px">Quality</div>
    <div class="stars" id="stars-q"></div>
    <button class="submit-fb" id="submit-fb">Submit feedback</button>
  </div>
  <button class="back" id="back-btn">← Try another situation</button>
</div>

<!-- DECLINED -->
<div class="declined" id="v-declined">
  <div style="font-size:28px">◐</div>
  <div class="declined-ttl">Outside our range</div>
  <div class="declined-msg" id="declined-msg"></div>
  <button class="back" id="declined-back" style="margin:4px 0 0">← Go back</button>
</div>

<script src="popup.js"></script>
</body>
</html>
